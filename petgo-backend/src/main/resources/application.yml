# TailTopia 业务配置（凭证全部 env 注入，绝不入库；下方为占位/默认值）。
petgo:
  auth:
    jwt:
      # HS256 对称密钥（≥32 字节）。生产经 env JWT_SECRET 注入真实强密钥。
      secret: ${JWT_SECRET:dev-only-insecure-jwt-secret-please-change-0123456789}
      issuer: ${JWT_ISSUER:petgo}
      access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:900}
    refresh:
      ttl-days: ${JWT_REFRESH_TTL_DAYS:30}
    google:
      # Google OAuth client id（aud 校验）。env 注入；留空时跳过 aud 严格校验（仅 dev/L0）。
      client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
    apple:
      # Apple Sign-In client id（aud 校验，通常 = iOS bundle id）。env 注入；留空时跳过 aud 严格校验（仅 dev/L0）。
      client-id: ${APPLE_CLIENT_ID:}
  # AI 智能分诊（Story 4.1）：Gemini Developer API（gemini-2.5-flash，签名 URL 直拉私密图）。
  # mode=stub（默认）走打桩客户端，无凭证即可启动并验状态机；mode=live 才打真实 Gemini（L2，需 key）。
  ai:
    gemini:
      mode: ${GEMINI_MODE:stub}
      # key 全部 env 注入，绝不入库 / 不落日志（.env.example 仅占位）。
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.5-flash}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
      timeout-seconds: ${GEMINI_TIMEOUT_SECONDS:10}
  # 腾讯 IM 实时会话（Story 5.5）。mode=stub（默认）本地生成会话 id + 占位 UserSig，免凭证验状态机/接单 CAS；
  # mode=live 才接真实腾讯 IM（L2，需真机 + SDKAppID/SecretKey）。SecretKey 绝不下发客户端 / 不落日志。
  im:
    mode: ${IM_MODE:stub}
    sdk-app-id: ${TENCENT_IM_SDK_APP_ID:}
    secret-key: ${TENCENT_IM_SECRET_KEY:}
    user-sig-ttl-seconds: ${IM_USERSIG_TTL_SECONDS:86400}
    callback-token: ${TENCENT_IM_CALLBACK_TOKEN:}
    # live REST 域名（按数据中心选德国/欧洲，与后端同区）+ 管理员 IM 标识（REST 鉴权身份，不计 MAU）。
    rest-base-url: ${IM_REST_BASE_URL:https://adminapiger.im.qcloud.com}
    admin-identifier: ${IM_ADMIN_IDENTIFIER:administrator}
  # App 版本更新提醒（Story 6.5，App 内提示，外部化配置运营可调，不走推送）。
  app-version:
    latest: ${APP_LATEST_VERSION:1.0.0}
    min-supported: ${APP_MIN_SUPPORTED_VERSION:1.0.0}
    ios-store-url: ${APP_IOS_STORE_URL:}
    android-store-url: ${APP_ANDROID_STORE_URL:}
  # 对外 H5（名片 /p、里程碑庆祝分享 /m）下载 CTA（CardPageController + MilestoneSharePageController 共用）。
  # V1 仅 Android 上架：iOS / 桌面统一兜底到 Play 商店；待 iOS 上架再单独配 CARD_IOS_URL。env 可覆盖。
  card:
    android-url: ${CARD_ANDROID_URL:https://play.google.com/store/apps/details?id=com.tailtopia.app}
    ios-url: ${CARD_IOS_URL:https://play.google.com/store/apps/details?id=com.tailtopia.app}
    app-download-url: ${CARD_APP_DOWNLOAD_URL:https://play.google.com/store/apps/details?id=com.tailtopia.app}

# 媒体基建（Story 2.1）：阿里云 OSS 雅加达双桶 + STS 直传 + 签名 URL。
# 凭证全部 env 注入，绝不入库；下方仅占位/默认。
media:
  access-key-id: ${ALIYUN_ACCESS_KEY_ID:}
  access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}
  oss:
    endpoint: ${OSS_ENDPOINT:https://oss-ap-southeast-5.aliyuncs.com}
    region: ${OSS_REGION:ap-southeast-5}
    public-bucket: ${OSS_PUBLIC_BUCKET:}
    private-bucket: ${OSS_PRIVATE_BUCKET:}
    cdn-base-url: ${OSS_CDN_BASE_URL:}
  signed-url:
    ttl-seconds: ${SIGNED_URL_TTL_SECONDS:300}
    upload-ttl-seconds: ${UPLOAD_URL_TTL_SECONDS:600}

# 内容审核（内容审核 Story 1）：阿里云内容安全 green20220302 + 分层词库 + fail-closed 降级。
# 凭证全部 env 注入，绝不入库 / 不落日志。mode=stub（默认，无凭证）走打桩客户端验评分/降级状态机（L0/L1）；
# mode=live 才打真实阿里云内容安全（L2，需真实 AK + 印尼语实测）。AK 可复用 OSS 段 ALIYUN_ACCESS_KEY_*。
app:
  moderation:
    mode: ${MODERATION_MODE:stub}
    risk-threshold: ${MODERATION_RISK_THRESHOLD:0.8}
    text-timeout-ms: ${MODERATION_TEXT_TIMEOUT_MS:1000}
    image-timeout-ms: ${MODERATION_IMAGE_TIMEOUT_MS:2000}
    aliyun:
      region: ${MODERATION_ALIYUN_REGION:ap-southeast-1}
      endpoint: ${MODERATION_ALIYUN_ENDPOINT:green-cip.ap-southeast-1.aliyuncs.com}
      access-key-id: ${MODERATION_ALIYUN_AK_ID:${ALIYUN_ACCESS_KEY_ID:}}
      access-key-secret: ${MODERATION_ALIYUN_AK_SECRET:${ALIYUN_ACCESS_KEY_SECRET:}}
    image-threshold:
      porn: ${MODERATION_IMG_PORN:0.85}
      violence: ${MODERATION_IMG_VIOLENCE:0.80}
      contraband: ${MODERATION_IMG_CONTRABAND:0.75}

spring:
  application:
    name: petgo-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:petgo}
    username: ${DB_USER:petgo}
    password: ${DB_PASSWORD:petgo}
  jpa:
    # schema 由 Flyway 管理；禁用 Hibernate 自动建表（架构强制护栏：禁 update/create）
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # 逻辑 DB 序号：本地独占 redis 用 0；生产与其他项目共用同一 redis 容器时，
      # 经 env REDIS_DB 指定独立序号（如 2）隔离 keyspace，避免撞键 / 跨项目 FLUSHDB 误伤。
      database: ${REDIS_DB:0}
  # 命名映射链：JSON camelCase（Jackson 默认）；null 字段省略；时间 ISO-8601 UTC。
  # 注：Jackson 3（Boot 4）默认即输出 ISO-8601 日期字符串（WRITE_DATES_AS_TIMESTAMPS 已移至 DateTimeFeature 且默认关），无需显式设置。
  jackson:
    default-property-inclusion: non_null
    time-zone: UTC
  # 管理后台双语 i18n（Story 1.6）：messageSource 由 AdminLocaleConfig 显式定义（basename classpath:i18n/messages，
  # UTF-8，缺键回退 code）。不用 spring.messages.* 自动配置——其条件要求基底 messages.properties，本项目仅 zh_CN/en 变体。

server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      # Story 1.2 AC6：后台会话闲置 8h 过期（滑动续期）。仅影响会话链（/admin/**）；/api/v1 无状态不受影响。
      timeout: ${ADMIN_SESSION_TIMEOUT:8h}

# 管理后台（Story 1.2）：Lark OAuth + 企业租户白名单门控。凭证 env 注入绝不入库。
admin:
  lark:
    base-url: ${LARK_BASE_URL:https://open.larksuite.com}
    app-id: ${LARK_APP_ID:}
    app-secret: ${LARK_APP_SECRET:}
    redirect-uri: ${LARK_REDIRECT_URI:}
    tenant-key: ${LARK_TENANT_KEY:}

# Actuator：仅暴露 health + info（/actuator/** 内网语义，prod 由 CF/防火墙限制）
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    db:
      enabled: true
    redis:
      enabled: true

# 接口日志落盘（全环境）：全部应用日志（含 ApiAccessLoggingFilter 的 req+resp）写文件，按日期拆分。
# 文件为 ECS JSON；按 log.logger=...ApiAccessLog 过滤即「接口访问日志」。脱敏由 LogSanitizer 保证（护栏）。
# 生产容器请把 ${LOG_PATH} 指向挂载卷以持久化（否则随容器重建丢失）。
logging:
  file:
    name: ${LOG_PATH:logs}/petgo.log
  logback:
    rollingpolicy:
      file-name-pattern: ${LOG_PATH:logs}/petgo-%d{yyyy-MM-dd}.%i.log.gz
      max-file-size: 50MB
      max-history: 14
      total-size-cap: 2GB
  structured:
    format:
      file: ecs

# OpenAPI 3.1 文档（springdoc）
springdoc:
  api-docs:
    path: /v3/api-docs
    version: openapi_3_1
  swagger-ui:
    path: /swagger-ui.html
