# PetGo 业务配置（凭证全部 env 注入，绝不入库；下方为占位/默认值）。
petgo:
  auth:
    jwt:
      # HS256 对称密钥（≥32 字节）。生产经 env JWT_SECRET 注入真实强密钥。
      secret: ${JWT_SECRET:dev-only-insecure-jwt-secret-please-change-0123456789}
      issuer: ${JWT_ISSUER:petgo}
      access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:900}
    refresh:
      ttl-days: ${JWT_REFRESH_TTL_DAYS:30}
    google:
      # Google OAuth client id（aud 校验）。env 注入；留空时跳过 aud 严格校验（仅 dev/L0）。
      client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
  # AI 智能分诊（Story 4.1）：Gemini Developer API（gemini-2.5-flash，签名 URL 直拉私密图）。
  # mode=stub（默认）走打桩客户端，无凭证即可启动并验状态机；mode=live 才打真实 Gemini（L2，需 key）。
  ai:
    gemini:
      mode: ${GEMINI_MODE:stub}
      # key 全部 env 注入，绝不入库 / 不落日志（.env.example 仅占位）。
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.5-flash}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
      timeout-seconds: ${GEMINI_TIMEOUT_SECONDS:10}
  # 腾讯 IM 实时会话（Story 5.5）。mode=stub（默认）本地生成会话 id + 占位 UserSig，免凭证验状态机/接单 CAS；
  # mode=live 才接真实腾讯 IM（L2，需真机 + SDKAppID/SecretKey）。SecretKey 绝不下发客户端 / 不落日志。
  im:
    mode: ${IM_MODE:stub}
    sdk-app-id: ${TENCENT_IM_SDK_APP_ID:}
    secret-key: ${TENCENT_IM_SECRET_KEY:}
    user-sig-ttl-seconds: ${IM_USERSIG_TTL_SECONDS:86400}
    callback-token: ${TENCENT_IM_CALLBACK_TOKEN:}
  # App 版本更新提醒（Story 6.5，App 内提示，外部化配置运营可调，不走推送）。
  app-version:
    latest: ${APP_LATEST_VERSION:1.0.0}
    min-supported: ${APP_MIN_SUPPORTED_VERSION:1.0.0}
    ios-store-url: ${APP_IOS_STORE_URL:}
    android-store-url: ${APP_ANDROID_STORE_URL:}

# 媒体基建（Story 2.1）：阿里云 OSS 雅加达双桶 + STS 直传 + 签名 URL。
# 凭证全部 env 注入，绝不入库；下方仅占位/默认。
media:
  access-key-id: ${ALIYUN_ACCESS_KEY_ID:}
  access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}
  oss:
    endpoint: ${OSS_ENDPOINT:https://oss-ap-southeast-5.aliyuncs.com}
    region: ${OSS_REGION:ap-southeast-5}
    public-bucket: ${OSS_PUBLIC_BUCKET:}
    private-bucket: ${OSS_PRIVATE_BUCKET:}
    cdn-base-url: ${OSS_CDN_BASE_URL:}
  sts:
    role-arn: ${STS_ROLE_ARN:}
    endpoint: ${STS_ENDPOINT:sts.ap-southeast-5.aliyuncs.com}
    duration-seconds: ${STS_DURATION_SECONDS:900}
  signed-url:
    ttl-seconds: ${SIGNED_URL_TTL_SECONDS:300}

spring:
  application:
    name: petgo-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:petgo}
    username: ${DB_USER:petgo}
    password: ${DB_PASSWORD:petgo}
  jpa:
    # schema 由 Flyway 管理；禁用 Hibernate 自动建表（架构强制护栏：禁 update/create）
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  # 命名映射链：JSON camelCase（Jackson 默认）；null 字段省略；时间 ISO-8601 UTC。
  # 注：Jackson 3（Boot 4）默认即输出 ISO-8601 日期字符串（WRITE_DATES_AS_TIMESTAMPS 已移至 DateTimeFeature 且默认关），无需显式设置。
  jackson:
    default-property-inclusion: non_null
    time-zone: UTC

server:
  port: ${SERVER_PORT:8080}

# Actuator：仅暴露 health + info（/actuator/** 内网语义，prod 由 CF/防火墙限制）
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    db:
      enabled: true
    redis:
      enabled: true

# OpenAPI 3.1 文档（springdoc）
springdoc:
  api-docs:
    path: /v3/api-docs
    version: openapi_3_1
  swagger-ui:
    path: /swagger-ui.html
