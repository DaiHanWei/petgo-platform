<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="#{admin.seed.title}">种子内容发布 · TailTopia 运营后台</title>
    <link rel="stylesheet" th:href="@{/admin/admin.css}"/>
</head>
<body>
<div th:replace="~{admin/layout :: page(~{::content})}">
    <div th:fragment="content" th:remove="tag">
        <div class="card">
            <h1 th:text="#{admin.seed.title}">发布种子内容</h1>
            <p class="ok" th:if="${publishedId}">
                <span th:text="#{admin.seed.published.prefix}">已发布，内容 ID：</span><span th:text="${publishedId}">0</span><span th:text="#{admin.seed.published.suffix}">（与用户内容混排，无特殊标记）。</span>
            </p>
            <form th:action="@{/admin/seed-post}" th:object="${seedPostForm}" method="post">
                <div th:if="${#fields.hasGlobalErrors()}">
                    <p class="err" th:each="e : ${#fields.globalErrors()}" th:text="${e}">错误</p>
                </div>
                <label class="field" for="type" th:text="#{admin.seed.type}">内容类型</label>
                <select id="type" th:field="*{type}" class="field-full">
                    <option th:each="t : ${types}" th:value="${t}" th:text="${t}">类型</option>
                </select>
                <p class="err" th:if="${#fields.hasErrors('type')}" th:errors="*{type}">类型错误</p>

                <label class="field" for="text" th:text="#{admin.seed.text}">正文（≤1000 字）</label>
                <textarea id="text" th:field="*{text}" maxlength="1000"></textarea>
                <p class="err" th:if="${#fields.hasErrors('text')}" th:errors="*{text}">正文错误</p>

                <label class="field" for="imageUrlsRaw" th:text="#{admin.seed.images}">图片 URL（每行一个，≤9 张，公开桶 CDN 链接）</label>
                <textarea id="imageUrlsRaw" th:field="*{imageUrlsRaw}"></textarea>
                <p class="hint" th:text="#{admin.seed.images.hint}">种子图须为已上传公开桶的 URL。</p>

                <label class="field" for="petId" th:text="#{admin.seed.petId}">绑定宠物 ID</label>
                <input type="number" id="petId" th:field="*{petId}" class="field-full"/>

                <button type="submit" class="btn btn-primary" th:text="#{admin.seed.submit}">发布</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
