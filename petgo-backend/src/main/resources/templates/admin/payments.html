<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<!-- 支付记录通用查询（Story 9.6，AB-8E）。按用户跨类型只读查 payment_intents。 -->
<head>
    <meta charset="UTF-8"/>
    <title>支付记录查询 · TailTopia 运营后台</title>
    <link rel="stylesheet" th:href="@{/admin/admin.css}"/>
</head>
<body>
<div th:replace="~{admin/layout :: page(~{::content})}">
    <div th:fragment="content" th:remove="tag">
        <h1>支付记录查询</h1>
        <div class="banner ok" th:if="${notice}" th:text="${notice}">ok</div>
        <div class="banner err" th:if="${error}" th:text="${error}">err</div>
        <p class="hint" th:if="${userId == null}">按时间倒序分页展示全部支付记录（跨类型：兽医咨询 / 充值 / AI 解锁 / 高清图）；如需精确排查可按用户 ID 过滤。</p>
        <p class="hint" th:if="${userId != null}">当前按用户 ID <span th:text="${userId}">0</span> 过滤；清空用户 ID 再查询可返回最近记录列表。</p>
        <form method="get" th:action="@{/admin/payments}">
            <label>用户 ID <input type="number" name="userId" th:value="${userId}"/></label>
            <button type="submit" class="btn btn-primary btn-sm">查询</button>
            <a th:if="${userId != null}" th:href="@{/admin/payments}" class="btn btn-sm">返回最近记录</a>
        </form>
        <table th:if="${payments != null}">
            <thead>
            <tr><th>用户</th><th>支付号</th><th>用途</th><th>渠道</th><th>金额</th><th>币种</th><th>状态</th><th>时间</th><th>操作</th></tr>
            </thead>
            <tbody>
            <tr th:each="p : ${payments}">
                <td th:text="${p.userId}">0</td>
                <td th:text="${p.publicToken}">tok</td>
                <td th:text="${p.purpose}">VET_CONSULT</td>
                <td th:text="${p.channel}">QRIS</td>
                <td th:text="${p.amount}">0</td>
                <td th:text="${p.currency}">IDR</td>
                <td th:text="${p.status}">PAID</td>
                <td th:text="${p.createdAt}">t</td>
                <td>
                    <!-- ⚠️ stag 专用：仅 simulatorEnabled(stag env flag) 开 + PENDING 订单才渲染操作按钮 -->
                    <div th:if="${simulatorEnabled and p.status == 'PENDING'}" class="sim-actions">
                        <form method="post" style="display:inline"
                              th:action="@{/admin/payments/{t}/simulate(t=${p.publicToken})}">
                            <input type="hidden" name="target" value="SUCCESS"/>
                            <button type="submit" class="btn btn-sm btn-primary">成功</button>
                        </form>
                        <form method="post" style="display:inline"
                              th:action="@{/admin/payments/{t}/simulate(t=${p.publicToken})}">
                            <input type="hidden" name="target" value="FAILED"/>
                            <button type="submit" class="btn btn-sm">失败</button>
                        </form>
                        <form method="post" style="display:inline"
                              th:action="@{/admin/payments/{t}/simulate(t=${p.publicToken})}">
                            <input type="hidden" name="target" value="EXPIRED"/>
                            <button type="submit" class="btn btn-sm">过时</button>
                        </form>
                    </div>
                    <span th:unless="${simulatorEnabled and p.status == 'PENDING'}" class="muted">—</span>
                </td>
            </tr>
            <tr th:if="${payments.isEmpty()}"><td colspan="9" th:text="${userId == null} ? '暂无支付记录' : '该用户暂无支付记录'">暂无支付记录</td></tr>
            </tbody>
        </table>
        <div class="pager" th:if="${userId == null and payments != null and totalPages > 0}">
            <a th:if="${hasPrev}" th:href="@{/admin/payments(page=${page - 1})}" class="btn btn-sm">上一页</a>
            <span>第 <span th:text="${page + 1}">1</span> / <span th:text="${totalPages}">1</span> 页（共 <span th:text="${totalElements}">0</span> 条）</span>
            <a th:if="${hasNext}" th:href="@{/admin/payments(page=${page + 1})}" class="btn btn-sm">下一页</a>
        </div>
    </div>
</div>
</body>
</html>
