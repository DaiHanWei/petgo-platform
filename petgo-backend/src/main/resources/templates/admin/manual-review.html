<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<!-- 人工审核队列（Story 4.3，预建未激活）。超管或 content.manual_review 可见/可达；激活开关仅超管；PENDING 队列处置（通过/拒绝）。
     24h 未处理高亮（AC7）。V1.0.0 默认开关关 = 现网行为，队列恒空。 -->
<head>
    <meta charset="UTF-8"/>
    <title th:text="#{admin.review.title}">人工审核队列 · TailTopia 运营后台</title>
    <link rel="stylesheet" th:href="@{/admin/admin.css}"/>
    <!-- admin.js：原生 <dialog> 的 data-open/close-dialog 委托（拒绝弹框依赖），此前本页漏引致拒绝按钮无反应。 -->
    <script defer th:src="@{/admin/admin.js}"></script>
    <script th:src="@{/admin/vendor/htmx.min.js}"></script>
</head>
<body>
<div th:replace="~{admin/layout :: page(~{::content})}">
    <div th:fragment="content" th:remove="tag">
        <h1 th:text="#{admin.review.title}">人工审核队列</h1>
        <p class="muted" th:text="#{admin.review.note}">预建能力：默认未激活时维持现网「自动审核拦截即发布失败」；开启后未过审内容入队挂起。</p>
        <div class="banner ok" th:if="${notice}" th:text="${notice}">ok</div>
        <div class="banner err" th:if="${error}" th:text="${error}">err</div>

        <!-- 激活开关（仅超管）-->
        <div class="filter-bar" sec:authorize="hasRole('SUPER_ADMIN')">
            <span th:text="#{admin.review.switch.label}">人工审核：</span>
            <span class="badge" th:classappend="${manualReviewEnabled} ? 'badge-ok' : 'badge-neutral'"
                  th:text="${manualReviewEnabled} ? #{admin.review.switch.on} : #{admin.review.switch.off}">未激活</span>
            <form th:action="@{/admin/settings/manual-review}" method="post" class="inline-form">
                <input type="hidden" name="enabled" th:value="${!manualReviewEnabled}"/>
                <button type="submit" class="btn btn-sm"
                        th:classappend="${manualReviewEnabled} ? 'btn-neutral' : 'btn-primary'"
                        th:text="${manualReviewEnabled} ? #{admin.review.switch.disable} : #{admin.review.switch.enable}">开启</button>
            </form>
        </div>

        <table>
            <thead>
            <tr>
                <th th:text="#{admin.review.col.item}">队列项</th>
                <th th:text="#{admin.review.col.priority}">优先级</th>
                <th th:text="#{admin.review.col.content}">内容</th>
                <th th:text="#{admin.review.col.type}">类型</th>
                <th th:text="#{admin.review.col.author}">作者</th>
                <th th:text="#{admin.review.col.submitted}">提交时间</th>
                <th th:text="#{admin.review.col.action}">操作</th>
            </tr>
            </thead>
            <tbody id="review-rows" th:fragment="rows">
            <!-- 行按 priority 升序 + submitted_at 升序渲染（后端已排序，§5.1）；24h 高亮不变。 -->
            <tr th:each="r : ${items}" th:classappend="${r.overdue()} ? 'row-overdue'">
                <td th:text="${r.itemId()}">1</td>
                <td>
                    <span class="badge"
                          th:classappend="${r.priority().name() == 'P0'} ? 'badge-danger' : (${r.priority().name() == 'P1'} ? 'badge-warn' : 'badge-info')"
                          th:text="${r.priority()}">P1</span>
                    <!-- 运营改优先级（写操作 → 审计）。仅 PENDING 项；处置权门控。 -->
                    <form th:action="@{/admin/manual-review/{id}/priority(id=${r.itemId()})}" method="post"
                          class="inline-form" sec:authorize="hasRole('SUPER_ADMIN') or hasAuthority('content.takedown')">
                        <select name="priority" aria-label="priority">
                            <option value="P0">P0</option>
                            <option value="P1">P1</option>
                            <option value="P2">P2</option>
                        </select>
                        <button type="submit" class="btn btn-neutral btn-sm"
                                th:text="#{admin.review.priority.change}">改</button>
                    </form>
                </td>
                <td>
                    #<span th:text="${r.contentId()}">0</span>
                    <span class="badge badge-danger" th:if="${r.overdue()}" th:text="#{admin.review.overdue}">超 24h</span>
                    <div class="muted cell-wide" th:text="${#strings.abbreviate(r.textPreview(), 60)}">…</div>
                </td>
                <td th:text="${r.type()}">DAILY</td>
                <td>
                    <span th:text="${r.authorId()}">-</span>
                    <!-- 作者累计违规（§5.4，只读展示；story 9 未接入 → total=0 不显示）。 -->
                    <span class="badge badge-warn" th:if="${r.strikes().total() > 0}"
                          th:title="|帖子 ${r.strikes().post()} / 评论 ${r.strikes().comment()} / 名称 ${r.strikes().name()} / 头像 ${r.strikes().avatar()}|"
                          th:text="|#{admin.moderation.strikes.label} ${r.strikes().total()}|">累计违规</span>
                </td>
                <td th:text="${#temporals.format(r.submittedAt(), 'yyyy-MM-dd HH:mm')}">-</td>
                <td sec:authorize="hasRole('SUPER_ADMIN') or hasAuthority('content.takedown') or hasAuthority('content.manual_review')">
                    <!-- 通过 / 拒绝 左右并排。 -->
                    <div class="row-actions">
                        <form th:action="@{/admin/manual-review/{id}/approve(id=${r.itemId()})}" method="post"
                              class="inline">
                            <button type="submit" class="btn btn-primary btn-sm"
                                    th:text="#{admin.review.approve}">通过</button>
                        </form>
                        <!-- 拒绝：点按钮弹框采集判定依据（违规类别）+ 选填备注（§5.2，折叠进审计，无原文）。
                             data-open-dialog / data-close-dialog 由 admin.js 委托，无内联 JS。 -->
                        <button type="button" class="btn btn-danger btn-sm"
                                th:attr="data-open-dialog=|reject-dlg-${r.itemId()}|"
                                th:text="#{admin.review.reject}">拒绝</button>
                    </div>
                    <dialog th:id="|reject-dlg-${r.itemId()}|" class="modal">
                        <div class="modal-head">
                            <h3 th:text="#{admin.review.reject.title}">拒绝并记录原因</h3>
                            <button type="button" class="modal-close" data-close-dialog aria-label="Close">&times;</button>
                        </div>
                        <form th:action="@{/admin/manual-review/{id}/reject(id=${r.itemId()})}" method="post">
                            <div class="modal-body">
                                <label class="field" th:text="#{admin.review.reject.category}">原因</label>
                                <select name="category" class="field-full" aria-label="category">
                                    <option value="ILLEGAL" th:text="#{admin.review.cat.illegal}">违法</option>
                                    <option value="HATE" th:text="#{admin.review.cat.hate}">仇恨</option>
                                    <option value="PORN" th:text="#{admin.review.cat.porn}">色情</option>
                                    <option value="POLITICAL" th:text="#{admin.review.cat.political}">政治敏感</option>
                                    <option value="AD" th:text="#{admin.review.cat.ad}">广告引流</option>
                                    <option value="HARASSMENT" th:text="#{admin.review.cat.harassment}">骚扰</option>
                                    <option value="OTHER" selected th:text="#{admin.review.cat.other}">其他</option>
                                </select>
                                <label class="field" th:text="#{admin.review.reject.note}">备注（选填）</label>
                                <textarea name="note" rows="2" class="field-full"></textarea>
                            </div>
                            <div class="modal-foot">
                                <button type="button" class="btn btn-neutral" data-close-dialog
                                        th:text="#{admin.review.cancel}">取消</button>
                                <button type="submit" class="btn btn-danger"
                                        th:text="#{admin.review.reject.confirm}">确认拒绝</button>
                            </div>
                        </form>
                    </dialog>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(items)}">
                <td colspan="7" class="empty" th:text="#{admin.review.empty}">队列为空。</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
