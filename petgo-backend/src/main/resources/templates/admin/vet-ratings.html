<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<!-- 兽医评分查看（Story 5.6，AC4）。仅运营可见，普通用户/兽医 API 不暴露。-->
<head>
    <meta charset="UTF-8"/>
    <title>兽医评分 · PetGo 运营</title>
    <style>
        table { border-collapse: collapse; width: 100%; background: #fff; font-size: 14px; }
        th, td { border: 1px solid #e1e4e8; padding: 8px 10px; text-align: left; }
        th { background: #f0f2f5; }
        .summary { background: #fff; padding: 16px; border: 1px solid #e1e4e8; margin-bottom: 18px; max-width: 480px; }
        .avg { font-size: 28px; font-weight: 700; color: #2d6cdf; }
        a.back { font-size: 13px; color: #2d6cdf; }
    </style>
</head>
<body>
<div th:replace="~{admin/layout :: page(~{::content})}">
    <div th:fragment="content">
        <a class="back" th:href="@{/admin/vets}">← 返回兽医账号</a>
        <h2>兽医评分 · <span th:text="${vet.displayName()}">王医生</span></h2>

        <div class="summary">
            <div>平均分</div>
            <div class="avg"><span th:text="${ratings.average()}">0.0</span> ★</div>
            <div>共 <span th:text="${ratings.count()}">0</span> 条评分</div>
        </div>

        <table>
            <thead>
            <tr><th>星级</th><th>评价</th><th>时间</th></tr>
            </thead>
            <tbody>
            <tr th:each="r : ${ratings.items()}">
                <td th:text="${r.stars()} + ' ★'">5 ★</td>
                <td th:text="${r.comment()}">很专业</td>
                <td th:text="${r.createdAt()}">2026-06-02</td>
            </tr>
            <tr th:if="${#lists.isEmpty(ratings.items())}">
                <td colspan="3">暂无评分</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
