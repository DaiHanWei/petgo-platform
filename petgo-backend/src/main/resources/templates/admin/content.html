<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<!-- 全量内容管理（Story 4.2）：跨作者浏览三类内容 + 多维筛选 + 正文搜索 + 主动下架(必填原因)/恢复。
     SSR + HTMX 片段刷新；门控 content.proactive_takedown（浏览/下架）/ content.restore（恢复）。 -->
<head>
    <meta charset="UTF-8"/>
    <title th:text="#{admin.content.title}">内容管理 · TailTopia 运营后台</title>
    <link rel="stylesheet" th:href="@{/admin/admin.css}"/>
    <script th:src="@{/admin/vendor/htmx.min.js}"></script>
</head>
<body>
<div th:replace="~{admin/layout :: page(~{::content})}">
    <div th:fragment="content" th:remove="tag">
        <h1 th:text="#{admin.content.title}">内容管理</h1>
        <p class="muted" th:text="#{admin.content.note}">无举报时也可主动处置违规内容；下架/恢复均留审计。</p>
        <div class="banner ok" th:if="${notice}" th:text="${notice}">ok</div>
        <div class="banner err" th:if="${error}" th:text="${error}">err</div>

        <!-- 筛选 + 搜索（GET → HTMX 片段刷新）-->
        <form class="filter-bar" th:action="@{/admin/content}" method="get"
              hx-get="/admin/content" hx-target="#content-rows" hx-swap="outerHTML">
            <label>
                <select name="type">
                    <option value="" th:text="#{admin.content.type.all}">全部类型</option>
                    <option value="DAILY" th:selected="${type == 'DAILY'}"
                            th:text="#{admin.content.type.daily}">日常</option>
                    <option value="KNOWLEDGE" th:selected="${type == 'KNOWLEDGE'}"
                            th:text="#{admin.content.type.knowledge}">知识</option>
                    <option value="GROWTH_MOMENT" th:selected="${type == 'GROWTH_MOMENT'}"
                            th:text="#{admin.content.type.growth}">成长瞬间</option>
                </select>
            </label>
            <label>
                <input type="number" name="authorId" th:value="${authorId}" min="1"
                       th:placeholder="#{admin.content.authorId}" style="width:120px"/>
            </label>
            <label>
                <select name="status">
                    <option value="" th:text="#{admin.content.status.all}">全部状态</option>
                    <option value="ONLINE" th:selected="${status == 'ONLINE'}"
                            th:text="#{admin.content.status.online}">上线中</option>
                    <option value="DELETED" th:selected="${status == 'DELETED'}"
                            th:text="#{admin.content.status.deleted}">已下架</option>
                </select>
            </label>
            <label>
                <input type="date" name="from" th:value="${from}"/>
            </label>
            <label>
                <input type="date" name="to" th:value="${to}"/>
            </label>
            <label>
                <input type="search" name="q" th:value="${q}" th:placeholder="#{admin.content.searchPlaceholder}"
                       style="width:220px"/>
            </label>
            <button type="submit" class="btn btn-primary" th:text="#{admin.content.search}">查询</button>
        </form>

        <table>
            <thead>
            <tr>
                <th th:text="#{admin.content.col.id}">ID</th>
                <th th:text="#{admin.content.col.type}">类型</th>
                <th th:text="#{admin.content.col.author}">作者</th>
                <th th:text="#{admin.content.col.preview}">正文预览</th>
                <th th:text="#{admin.content.col.created}">创建时间</th>
                <th th:text="#{admin.content.col.status}">状态</th>
                <th th:text="#{admin.content.col.action}">操作</th>
            </tr>
            </thead>
            <tbody id="content-rows" th:fragment="rows">
            <tr th:each="c : ${items}">
                <td th:text="${c.id()}">1</td>
                <td th:text="${c.type()}">DAILY</td>
                <td th:text="${c.authorId()}">-</td>
                <td class="muted cell-wide" th:text="${#strings.abbreviate(c.textPreview(), 60)}">…</td>
                <td th:text="${#temporals.format(c.createdAt(), 'yyyy-MM-dd HH:mm')}">-</td>
                <td>
                    <span class="badge" th:classappend="${c.deleted()} ? 'badge-danger' : 'badge-ok'"
                          th:text="${c.deleted()} ? #{admin.content.status.deleted} : #{admin.content.status.online}">上线中</span>
                </td>
                <td>
                    <!-- 上线中 → 主动下架（必填原因）-->
                    <form th:unless="${c.deleted()}" th:action="@{/admin/content/{id}/takedown(id=${c.id()})}"
                          method="post" class="inline-form"
                          sec:authorize="hasRole('SUPER_ADMIN') or hasAuthority('content.proactive_takedown')">
                        <input type="text" name="reason" required th:placeholder="#{admin.content.reason}"
                               style="width:160px"/>
                        <button type="submit" class="btn btn-danger btn-sm"
                                th:text="#{admin.content.takedown}">下架</button>
                    </form>
                    <!-- 已下架 → 恢复 -->
                    <form th:if="${c.deleted()}" th:action="@{/admin/content/{id}/restore(id=${c.id()})}"
                          method="post" class="inline-form"
                          sec:authorize="hasRole('SUPER_ADMIN') or hasAuthority('content.restore')">
                        <button type="submit" class="btn btn-neutral btn-sm"
                                th:text="#{admin.content.restore}">恢复</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(items)}">
                <td colspan="7" class="empty" th:text="#{admin.content.empty}">无匹配内容。</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
