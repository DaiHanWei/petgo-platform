<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<!-- 名称/头像违规处置控制台（内容审核 story 8，§5.2/§6.2）。增量页：待审列表数据来自 story 4/5，
     重置领域逻辑归 story 4/5，本页只采集判定依据/备注并委托。审核证据（名称原文/头像图）仅授权运营可见（§5.5）。
     处置用 HTMX 表单 POST，就地回显结果文本（与 story 4 名称端点对称）。本版本无申诉通道。 -->
<head>
    <meta charset="UTF-8"/>
    <title th:text="#{admin.nameavatar.title}">名称/头像审核 · TailTopia 运营后台</title>
    <link rel="stylesheet" th:href="@{/admin/admin.css}"/>
    <script th:src="@{/admin/vendor/htmx.min.js}"></script>
</head>
<body>
<div th:replace="~{admin/layout :: page(~{::content})}">
    <div th:fragment="content" th:remove="tag">
        <h1 th:text="#{admin.nameavatar.title}">名称/头像审核</h1>
        <p class="muted" th:text="#{admin.nameavatar.note}">运营对名称/头像人工队列项判定；违规将重置为系统默认编码名/平台默认头像并通知用户。</p>

        <!-- 本版本无申诉通道（§5.5，显式记录）。 -->
        <div class="banner warn" th:text="#{admin.moderation.noAppeal}">本版本不提供申诉/复议通道：误判用户可重新提交合规内容。</div>

        <!-- ===== 名称违规候选 ===== -->
        <h2 th:text="#{admin.nameavatar.name.section}">名称待审</h2>
        <table>
            <thead>
            <tr>
                <th th:text="#{admin.nameavatar.col.target}">目标</th>
                <th th:text="#{admin.nameavatar.col.value}">当前值（审核证据）</th>
                <th th:text="#{admin.nameavatar.col.risk}">风险分</th>
                <th th:text="#{admin.review.col.submitted}">提交时间</th>
                <th th:text="#{admin.moderation.strikes.label}">累计违规</th>
                <th th:text="#{admin.review.col.action}">操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${nameRows}">
                <td>#<span th:text="${r.recordId()}">0</span>
                    <span class="badge badge-info" th:text="${r.targetType()}">NICKNAME</span></td>
                <td class="cell-wide" th:text="${#strings.abbreviate(r.valuePreview(), 40)}">…</td>
                <td th:text="${r.riskScore() != null} ? ${r.riskScore()} : '—'">—</td>
                <td th:text="${#temporals.format(r.submittedAt(), 'yyyy-MM-dd HH:mm')}">-</td>
                <td>
                    <span th:if="${r.strikes().total() == 0}">—</span>
                    <span class="badge badge-warn" th:if="${r.strikes().total() > 0}"
                          th:title="|帖子 ${r.strikes().post()} / 评论 ${r.strikes().comment()} / 名称 ${r.strikes().name()} / 头像 ${r.strikes().avatar()}|"
                          th:text="${r.strikes().total()}">0</span>
                </td>
                <td sec:authorize="hasRole('SUPER_ADMIN') or hasAuthority('content.takedown')">
                    <form th:hx-post="@{/admin/name-moderation/{id}/decide(id=${r.recordId()})}"
                          th:hx-target="'#name-result-' + ${r.recordId()}" hx-swap="innerHTML" class="inline-form">
                        <!-- HTMX 表单不走 th:action → 手动带 CSRF token（/admin 会话 CSRF 链）。 -->
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <select name="category" aria-label="category">
                            <option value="ILLEGAL" th:text="#{admin.review.cat.illegal}">违法</option>
                            <option value="HATE" th:text="#{admin.review.cat.hate}">仇恨</option>
                            <option value="PORN" th:text="#{admin.review.cat.porn}">色情</option>
                            <option value="POLITICAL" th:text="#{admin.review.cat.political}">政治敏感</option>
                            <option value="AD" th:text="#{admin.review.cat.ad}">广告引流</option>
                            <option value="HARASSMENT" th:text="#{admin.review.cat.harassment}">骚扰</option>
                            <option value="OTHER" selected th:text="#{admin.review.cat.other}">其他</option>
                        </select>
                        <input type="text" name="note" class="input-sm" th:placeholder="#{admin.review.reject.note}"/>
                        <button type="submit" name="decision" value="VIOLATION" class="btn btn-danger btn-sm"
                                th:text="#{admin.nameavatar.reset.name}">重置默认名</button>
                        <button type="submit" name="decision" value="PASS" class="btn btn-neutral btn-sm"
                                th:text="#{admin.nameavatar.pass}">判过保留</button>
                    </form>
                    <span class="muted" th:id="'name-result-' + ${r.recordId()}"></span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(nameRows)}">
                <td colspan="6" class="empty" th:text="#{admin.nameavatar.empty}">无待审项（能力未就绪或队列为空）。</td>
            </tr>
            </tbody>
        </table>

        <!-- ===== 头像违规候选 ===== -->
        <h2 th:text="#{admin.nameavatar.avatar.section}">头像待审</h2>
        <table>
            <thead>
            <tr>
                <th th:text="#{admin.nameavatar.col.target}">目标</th>
                <th th:text="#{admin.nameavatar.col.value}">当前值（审核证据）</th>
                <th th:text="#{admin.nameavatar.col.risk}">风险分</th>
                <th th:text="#{admin.review.col.submitted}">提交时间</th>
                <th th:text="#{admin.moderation.strikes.label}">累计违规</th>
                <th th:text="#{admin.review.col.action}">操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${avatarRows}">
                <td>#<span th:text="${r.reviewId()}">0</span>
                    <span class="badge badge-info" th:text="${r.subjectType()}">USER_AVATAR</span></td>
                <td>
                    <img th:if="${r.avatarUrl() != null}" th:src="${r.avatarUrl()}" alt="avatar"
                         style="width:40px;height:40px;object-fit:cover;border-radius:6px"/>
                    <span th:unless="${r.avatarUrl() != null}">—</span>
                </td>
                <td th:text="${r.riskScore() != null} ? ${r.riskScore()} : '—'">—</td>
                <td th:text="${#temporals.format(r.createdAt(), 'yyyy-MM-dd HH:mm')}">-</td>
                <td>
                    <span th:if="${r.strikes().total() == 0}">—</span>
                    <span class="badge badge-warn" th:if="${r.strikes().total() > 0}"
                          th:title="|帖子 ${r.strikes().post()} / 评论 ${r.strikes().comment()} / 名称 ${r.strikes().name()} / 头像 ${r.strikes().avatar()}|"
                          th:text="${r.strikes().total()}">0</span>
                </td>
                <td sec:authorize="hasRole('SUPER_ADMIN') or hasAuthority('content.takedown')">
                    <form th:hx-post="@{/admin/avatar-review/{id}/decide(id=${r.reviewId()})}"
                          th:hx-target="'#avatar-result-' + ${r.reviewId()}" hx-swap="innerHTML" class="inline-form">
                        <!-- HTMX 表单不走 th:action → 手动带 CSRF token（/admin 会话 CSRF 链）。 -->
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <select name="category" aria-label="category">
                            <option value="ILLEGAL" th:text="#{admin.review.cat.illegal}">违法</option>
                            <option value="PORN" th:text="#{admin.review.cat.porn}">色情</option>
                            <option value="POLITICAL" th:text="#{admin.review.cat.political}">政治敏感</option>
                            <option value="OTHER" selected th:text="#{admin.review.cat.other}">其他</option>
                        </select>
                        <input type="text" name="note" class="input-sm" th:placeholder="#{admin.review.reject.note}"/>
                        <button type="submit" name="decision" value="VIOLATION" class="btn btn-danger btn-sm"
                                th:text="#{admin.nameavatar.reset.avatar}">重置默认头像</button>
                        <button type="submit" name="decision" value="PASS" class="btn btn-neutral btn-sm"
                                th:text="#{admin.nameavatar.pass}">判过保留</button>
                    </form>
                    <span class="muted" th:id="'avatar-result-' + ${r.reviewId()}"></span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(avatarRows)}">
                <td colspan="6" class="empty" th:text="#{admin.nameavatar.empty}">无待审项（能力未就绪或队列为空）。</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
