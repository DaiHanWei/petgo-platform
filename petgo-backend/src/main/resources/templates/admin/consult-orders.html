<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<!-- 兽医咨询订单只读管理（Story 9.3，AB-8B）。只读 + 待核查标记 + 导出；无退款入口（退款走工单）。 -->
<head>
    <meta charset="UTF-8"/>
    <title>兽医咨询订单 · TailTopia 运营后台</title>
    <link rel="stylesheet" th:href="@{/admin/admin.css}"/>
</head>
<body>
<div th:replace="~{admin/layout :: page(~{::content})}">
    <div th:fragment="content" th:remove="tag">
        <h1>兽医咨询订单</h1>
        <div class="banner ok" th:if="${notice}" th:text="${notice}">ok</div>
        <div class="banner err" th:if="${error}" th:text="${error}">err</div>
        <p class="hint">只读追踪订单全流程；退款不在此处理（走客服工单）。可标记待核查。</p>
        <p>
            <a class="btn btn-neutral btn-sm" th:href="@{/admin/consult-orders/export}"
               sec:authorize="hasRole('SUPER_ADMIN') or hasAuthority('order.export')">导出 CSV</a>
        </p>
        <table>
            <thead>
            <tr>
                <th>订单</th><th>用户</th><th>兽医</th><th>金额</th><th>分成</th>
                <th>状态</th><th>重播</th><th>待核查</th><th>成交时间</th><th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="o : ${orders}">
                <td th:text="${o.orderToken}">tok</td>
                <td th:text="${o.userId}">0</td>
                <td th:text="${o.vetId}">0</td>
                <td th:text="${o.amount}">0</td>
                <td th:text="${o.vetPayout} ?: '—'">—</td>
                <td th:text="${o.statusCode}">IN_PROGRESS</td>
                <td th:text="${o.rebroadcastCount}">0</td>
                <td th:text="${o.verifyStatus == ''} ? '—' : ${o.verifyStatus}">—</td>
                <td th:text="${@adminTime.wib(o.paidAt)}">—</td>
                <td><a class="btn btn-neutral btn-sm"
                       th:href="@{/admin/consult-orders/{t}(t=${o.orderToken})}">详情</a></td>
            </tr>
            <tr th:if="${orders.isEmpty()}">
                <td colspan="10">暂无兽医咨询订单</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
