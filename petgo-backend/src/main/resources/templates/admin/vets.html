<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<!--
  兽医账号管理（Story 5.1）。复用 3.1 Admin shell。运营开户 / 重置密码 / 封禁开关。
  护栏：明文密码仅提交一次，绝不回显；列表绝不含 passwordHash。
-->
<head>
    <meta charset="UTF-8"/>
    <title>兽医账号 · TailTopia 运营</title>
    <style>
        table { border-collapse: collapse; width: 100%; background: #fff; font-size: 14px; }
        th, td { border: 1px solid #e1e4e8; padding: 8px 10px; text-align: left; }
        th { background: #f0f2f5; }
        .card { background: #fff; padding: 18px; border: 1px solid #e1e4e8; margin-bottom: 20px; max-width: 480px; }
        .card label { display: block; margin: 8px 0 4px; font-size: 13px; color: #444; }
        .card input { width: 100%; padding: 6px 8px; box-sizing: border-box; }
        .card button { margin-top: 12px; padding: 8px 16px; background: #2d6cdf; color: #fff; border: 0; cursor: pointer; }
        .err { color: #c0392b; font-size: 13px; }
        .ok { color: #1e7e34; font-size: 13px; }
        .badge { padding: 2px 8px; border-radius: 10px; font-size: 12px; }
        .badge.active { background: #d4edda; color: #1e7e34; }
        .badge.banned { background: #f8d7da; color: #c0392b; }
        .inline { display: inline; margin: 0; }
        .inline input[type=text] { width: 130px; padding: 4px 6px; }
        .inline button { padding: 4px 10px; cursor: pointer; }
    </style>
</head>
<body>
<div th:replace="~{admin/layout :: page(~{::content})}">
    <div th:fragment="content">
        <h2>兽医账号</h2>

        <div class="card">
            <h3>开户</h3>
            <p class="ok" th:if="${createdVetId != null}">
                已创建兽医账号（id=<span th:text="${createdVetId}">0</span>）。请将初始密码线下交付兽医，系统不再保存明文。
            </p>
            <form th:action="@{/admin/vets}" th:object="${createVetForm}" method="post">
                <p class="err" th:if="${#fields.hasErrors('*')}" th:errors="*{username}">校验错误</p>
                <p class="err" th:each="e : ${#fields.globalErrors()}" th:text="${e}">错误</p>
                <label>兽医昵称</label>
                <input type="text" th:field="*{displayName}"/>
                <label>登录账号</label>
                <input type="text" th:field="*{username}"/>
                <label>初始密码（≥8 位，仅本次可见）</label>
                <input type="password" th:field="*{password}"/>
                <button type="submit">创建</button>
            </form>
        </div>

        <table>
            <thead>
            <tr><th>ID</th><th>昵称</th><th>账号</th><th>状态</th><th>评分</th><th>重置密码</th><th>封禁</th></tr>
            </thead>
            <tbody>
            <tr th:each="v : ${vets}">
                <td th:text="${v.id()}">1</td>
                <td th:text="${v.displayName()}">王医生</td>
                <td th:text="${v.username()}">vet001</td>
                <td>
                    <span class="badge" th:classappend="${v.status() == 'ACTIVE'} ? 'active' : 'banned'"
                          th:text="${v.status()}">ACTIVE</span>
                </td>
                <td><a th:href="@{'/admin/vets/' + ${v.id()} + '/ratings'}">查看</a></td>
                <td>
                    <form class="inline" th:action="@{'/admin/vets/' + ${v.id()} + '/password'}" method="post">
                        <input type="text" name="newPassword" placeholder="新密码 ≥8 位"/>
                        <button type="submit">重置</button>
                    </form>
                </td>
                <td>
                    <form class="inline" th:action="@{'/admin/vets/' + ${v.id()} + '/status'}" method="post"
                          onsubmit="return confirm('确认变更该兽医封禁状态？封禁将立即踢下线并中断其进行中会话（不可恢复）。');">
                        <input type="hidden" name="banned" th:value="${v.status() == 'ACTIVE'}"/>
                        <button type="submit" th:text="${v.status() == 'ACTIVE'} ? '封禁' : '解封'">封禁</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(vets)}">
                <td colspan="7">暂无兽医账号</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
