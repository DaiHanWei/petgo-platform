<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>

    <link rel="stylesheet" th:href="@{/admin/admin.css}"/>
</head>
<body>
<div th:replace="~{admin/layout :: page(~{::content})}">

        <h1 th:text="#{admin.dashboard.title}">运营后台</h1>
        <p th:text="#{admin.dashboard.intro}">平台上线前可在此发布种子内容，让首页 Feed 不为空。</p>
        <ul>
            <li><a th:href="@{/admin/seed-post}" th:text="#{admin.dashboard.seedLink}">发布种子内容</a></li>
        </ul>
        <p class="muted" th:text="#{admin.dashboard.note}">举报审核、兽医账号与评分查看已挂入同一后台。</p>
    </div>
</div>

</html>
