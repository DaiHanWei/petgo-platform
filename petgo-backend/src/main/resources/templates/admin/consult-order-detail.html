<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<!-- 兽医咨询订单详情（Story 9.3）。成交快照 + 阶段时间线 + 待核查标记。⚠️ 无退款入口（退款走工单）。 -->
<head>
    <meta charset="UTF-8"/>
    <title>订单详情 · TailTopia 运营后台</title>
    <link rel="stylesheet" th:href="@{/admin/admin.css}"/>
</head>
<body>
<div th:replace="~{admin/layout :: page(~{::content})}">
    <div th:fragment="content" th:remove="tag">
        <p><a th:href="@{/admin/consult-orders}">← 返回订单列表</a></p>
        <h1>订单详情</h1>
        <div class="banner ok" th:if="${notice}" th:text="${notice}">ok</div>
        <div class="banner err" th:if="${error}" th:text="${error}">err</div>

        <h2>成交快照</h2>
        <table>
            <tr><th>订单号</th><td th:text="${order.orderToken}">tok</td></tr>
            <tr><th>用户 ID</th><td th:text="${order.userId}">0</td></tr>
            <tr><th>兽医 ID</th><td th:text="${order.vetId}">0</td></tr>
            <tr><th>宠物档案 ID</th><td th:text="${order.petProfileId}">0</td></tr>
            <tr><th>状态</th><td th:text="${order.statusCode}">IN_PROGRESS</td></tr>
            <tr><th>金额</th><td th:text="${#numbers.formatInteger(order.amount, 1, 'COMMA')}">0</td></tr>
            <tr><th>渠道</th><td th:text="${order.payChannel} ?: '—'">—</td></tr>
            <tr><th>兽医到手</th><td th:text="${order.vetPayout == null} ? '—' : ${#numbers.formatInteger(order.vetPayout, 1, 'COMMA')}">—</td></tr>
            <tr><th>分成比例</th><td th:text="${order.vetShareRateSnapshot} ?: '—'">—</td></tr>
            <tr><th>单价快照</th><td th:text="${order.unitPriceSnapshot == null} ? '—' : ${#numbers.formatInteger(order.unitPriceSnapshot, 1, 'COMMA')}">—</td></tr>
            <tr><th>重播次数</th><td th:text="${order.rebroadcastCount}">0</td></tr>
            <tr><th>成交时间</th><td th:text="${@adminTime.wib(order.paidAt)}">—</td></tr>
            <tr><th>会话起</th><td th:text="${order.sessionStartedAt} ?: '—'">—</td></tr>
            <tr><th>会话止</th><td th:text="${order.sessionEndedAt} ?: '—'">—</td></tr>
        </table>

        <h2>阶段时间线</h2>
        <table>
            <thead><tr><th>节点</th><th>时间</th><th>备注</th></tr></thead>
            <tbody>
            <tr th:each="s : ${order.stages}">
                <td th:text="${s.eventType}">PAID</td>
                <td th:text="${@adminTime.wib(s.occurredAt)}">t</td>
                <td th:text="${s.note} ?: '—'">—</td>
            </tr>
            <tr th:if="${order.stages.isEmpty()}"><td colspan="3">暂无阶段事件</td></tr>
            </tbody>
        </table>

        <!-- 待核查标记（纯注记，不改订单状态）；无退款按钮 -->
        <h2>待核查标记</h2>
        <p class="hint">当前：<span th:text="${order.verifyStatus == ''} ? '未标记' : ${order.verifyStatus}">未标记</span>
            <span th:if="${order.verifyNote}"> · 备注：<span th:text="${order.verifyNote}">note</span></span></p>
        <form method="post" th:action="@{/admin/consult-orders/{t}/verify(t=${order.orderToken})}"
              sec:authorize="hasRole('SUPER_ADMIN') or hasAuthority('order.view')">
            <label>标记
                <select name="status">
                    <option value="">清除标记</option>
                    <option value="TO_VERIFY">待核查</option>
                    <option value="VERIFIED">已核查</option>
                </select></label>
            <label>备注 <input type="text" name="note" maxlength="255"/></label>
            <button type="submit" class="btn btn-primary btn-sm">保存标记</button>
        </form>
        <p class="hint">⚠️ 退款不在此处理——如需退款请走客服工单两段审批。</p>
    </div>
</div>
</body>
</html>
