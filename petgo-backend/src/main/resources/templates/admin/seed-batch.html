<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<!-- 轻量批量种子发布（Story 9.8 Part 2）。选虚拟账号 + 多行逐条发 DAILY，内容 hash 去重。 -->
<head>
    <meta charset="UTF-8"/>
    <title>批量种子发布 · TailTopia 运营后台</title>
    <link rel="stylesheet" th:href="@{/admin/admin.css}"/>
</head>
<body>
<div th:replace="~{admin/layout :: page(~{::content})}">
    <div th:fragment="content" th:remove="tag">
        <h1>批量种子发布</h1>
        <div class="banner ok" th:if="${notice}" th:text="${notice}">ok</div>
        <div class="banner err" th:if="${error}" th:text="${error}">err</div>
        <p class="hint">以选定虚拟账号为作者逐条发日常（DAILY）种子。每行一条，格式
            <code>文本</code> 或 <code>文本 ||| 图URL1, 图URL2</code>（≤9 图）。相同内容跨批自动去重跳过。</p>
        <form method="post" th:action="@{/admin/seed-batch}">
            <label>虚拟账号
                <select name="virtualUserId" required>
                    <option value="" disabled selected>选择虚拟账号</option>
                    <option th:each="a : ${accounts}" th:value="${a.id}"
                            th:disabled="${!a.enabled}"
                            th:text="${a.nickname + ' (id=' + a.id + (a.enabled ? '' : ' · 停用') + ')'}">名</option>
                </select>
            </label>
            <p><label>批量内容（每行一条）<br/>
                <textarea name="lines" rows="12" cols="80" required
                          placeholder="今天带喵星人晒太阳啦 ||| https://cdn/x.jpg&#10;第二条日常..."></textarea></label></p>
            <button type="submit" class="btn btn-primary btn-sm">批量发布</button>
        </form>
    </div>
</div>
</body>
</html>
