# TailTopia 后端本地编排（德国单机配置占位）：app + PostgreSQL + Redis。
# 凭证全部走 .env（见 .env.example），真实凭证绝不入库。
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-petgo}
      POSTGRES_USER: ${DB_USER:-petgo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-petgo}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - petgo_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-petgo} -d ${DB_NAME:-petgo}"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-petgo}
      DB_USER: ${DB_USER:-petgo}
      DB_PASSWORD: ${DB_PASSWORD:-petgo}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${SERVER_PORT:-8080}:8080"

volumes:
  petgo_pg_data:
