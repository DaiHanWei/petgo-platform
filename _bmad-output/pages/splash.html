<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TailTopia · Core Pages Reference V1.0.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#DDD5EE;font-family:'Poppins',sans-serif;display:flex;gap:36px;padding:36px;min-height:100vh;align-items:flex-start;justify-content:center;}

/* ── PHONE FRAME ── */
.phone{width:390px;height:844px;background:var(--color-bg-default);border-radius:44px;border:9px solid #18152A;box-shadow:0 0 0 2px #2E2A4A,inset 0 0 0 1px rgba(255,255,255,.08),0 40px 80px rgba(0,0,0,.35);display:flex;flex-direction:column;overflow:hidden;position:relative;flex-shrink:0;}
.pill{position:absolute;top:13px;left:50%;transform:translateX(-50%);width:118px;height:33px;background:#18152A;border-radius:18px;z-index:100;}
.statusbar{height:54px;padding:17px 22px 0;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.statusbar .t{font-size:15px;font-weight:600;color:var(--color-text-primary);font-variant-numeric:tabular-nums;}
.statusbar .icons{display:flex;align-items:center;gap:5px;}
.pages{flex:1;overflow:hidden;position:relative;}
.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;display:none;padding-bottom:4px;background:var(--color-bg-default);}
.page::-webkit-scrollbar{display:none;}
.page.on{display:block;}

/* ── TAB BAR ── */
.tabbar{height:83px;background:var(--color-bg-surface);border-radius:32px 32px 0 0;box-shadow:0 -4px 20px rgba(22,34,51,.08);display:flex;align-items:flex-start;padding:10px 0 0;flex-shrink:0;position:relative;z-index:10;overflow:visible;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 2px;-webkit-tap-highlight-color:transparent;}
.tab:active{transform:scale(.92);}
.istack{position:relative;width:30px;height:30px;overflow:visible;}
.istack svg{position:absolute;top:0;left:0;width:26px;height:26px;}
/* shadow = red offset layer */
.ishadow{color:#F0425A;transform:translate(3px,3px);opacity:0;transition:opacity 150ms ease-out;}
/* outline = inactive */
.iout{color:var(--color-text-primary);opacity:.55;transition:opacity 150ms ease-out;}
/* fill = active main */
.ifill{color:#845EC9;opacity:0;transition:opacity 150ms ease-out;}
.tab.on .ishadow{opacity:1;}
.tab.on .iout{opacity:0;}
.tab.on .ifill{opacity:1;}
.tlabel{font-size:10px;font-weight:500;color:var(--color-text-tertiary);line-height:1;transition:color 150ms ease-out;}
.tab.on .tlabel{color:#845EC9;font-weight:600;}
/* + button */
.tabplus{flex:1;display:flex;align-items:flex-start;justify-content:center;background:none;border:none;cursor:pointer;padding:0;}
.plusinner{width:56px;height:56px;border-radius:9999px;background:#845EC9;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(132,94,201,.30);margin-top:-14px;transition:transform 100ms ease-out;}
.tabplus:active .plusinner{transform:scale(.93);}
.homebar{height:10px;background:var(--color-bg-surface);display:flex;justify-content:center;align-items:center;flex-shrink:0;}
.homebar div{width:130px;height:4px;background:#343434;border-radius:9999px;opacity:.25;}

/* ── SHARED UI ── */
.appbar{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 12px;}
.appbar-title{font-size:19px;font-weight:700;color:var(--color-text-primary);}
.ibtn{width:38px;height:38px;border-radius:11px;border:none;background:var(--color-bg-surface);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(22,34,51,.07);}
.ibtn svg{width:18px;height:18px;color:var(--color-text-primary);}
.chips{display:flex;gap:7px;padding:0 20px;overflow-x:auto;scrollbar-width:none;margin-bottom:14px;}
.chips::-webkit-scrollbar{display:none;}
.chip{padding:6px 13px;border-radius:9999px;font-size:12px;font-weight:500;white-space:nowrap;border:1.5px solid #E6E6E6;background:var(--color-bg-surface);color:var(--color-text-secondary);cursor:pointer;}
.chip.on{background:#845EC9;border-color:#845EC9;color:#fff;}
.card{margin:0 20px 10px;background:var(--color-bg-surface);border-radius:16px;box-shadow:0 4px 12px rgba(22,34,51,.06);overflow:hidden;}
.cbody{padding:13px;}
.row{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.av{width:34px;height:34px;border-radius:9999px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.avlg{width:62px;height:62px;border-radius:9999px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.meta{flex:1;}
.meta-name{font-size:13px;font-weight:600;color:var(--color-text-primary);}
.meta-time{font-size:11px;color:var(--color-text-tertiary);}
.badge{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;}
.b-story{background:#F8F6FF;color:#845EC9;}
.b-happy{background:#E7F8F0;color:#0E7A4D;}
.b-tips{background:#FEF3DE;color:#8A5A00;}
.ctext{font-size:13px;color:var(--color-text-primary);line-height:1.55;margin-bottom:9px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.imgph{width:100%;height:155px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:36px;}
.sectitle{font-size:15px;font-weight:600;color:var(--color-text-primary);padding:0 20px;margin-bottom:10px;}

/* ── PASSPORT ── */
.petcard{margin:0 20px 14px;background:var(--color-bg-surface);border-radius:20px;padding:18px;box-shadow:0 6px 20px rgba(22,34,51,.08);}
.pet-top{display:flex;gap:14px;align-items:center;margin-bottom:14px;}
.pname{font-size:19px;font-weight:700;color:var(--color-text-primary);}
.psub{font-size:12px;color:var(--color-text-secondary);margin-top:2px;}
.pbio{font-size:11px;color:var(--color-text-tertiary);font-style:italic;margin-top:3px;}
.statsrow{display:flex;gap:0;background:var(--color-bg-subtle);border-radius:12px;overflow:hidden;}
.statcol{flex:1;padding:10px 8px;text-align:center;}
.statcol+.statcol{border-left:1px solid #E6E6E6;}
.statn{font-size:17px;font-weight:700;color:#845EC9;}
.statl{font-size:10px;color:var(--color-text-secondary);margin-top:1px;}
.msbar{margin:0 20px 11px;background:var(--color-bg-surface);border-radius:12px;padding:11px 15px;box-shadow:0 2px 8px rgba(22,34,51,.05);}
.msrow{display:flex;justify-content:space-between;margin-bottom:7px;}
.mst{font-size:12px;font-weight:600;color:var(--color-text-primary);}
.msn{font-size:12px;font-weight:600;color:#845EC9;}
.track{height:5px;background:var(--color-bg-subtle);border-radius:9999px;overflow:hidden;}
.fill{height:100%;background:#845EC9;border-radius:9999px;}
.tentry{margin:0 20px 9px;background:var(--color-bg-surface);border-radius:13px;padding:11px;display:flex;gap:10px;box-shadow:0 2px 8px rgba(22,34,51,.05);}
.tdate{font-size:10px;color:var(--color-text-tertiary);font-weight:500;min-width:32px;text-align:center;padding-top:1px;line-height:1.4;}
.tthumb{width:52px;height:52px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;}
.tcol{flex:1;}
.ttitle{font-size:13px;color:var(--color-text-primary);font-weight:500;}
.tsub{font-size:11px;color:var(--color-text-tertiary);margin-top:2px;}
.hentry{display:flex;align-items:center;gap:9px;background:#FDE7EB;border-radius:12px;padding:10px 13px;margin:0 20px 9px;}
.htitle{font-size:12px;font-weight:600;color:#C4263C;}
.hsub{font-size:11px;color:#C4263C;opacity:.8;}
.hbadge{padding:4px 8px;background:#F0425A;color:#fff;border-radius:7px;font-size:10px;font-weight:700;white-space:nowrap;}

/* ── KONSULTASI ── */
.khero{padding:2px 20px 18px;}
.khtitle{font-size:21px;font-weight:700;color:var(--color-text-primary);margin-bottom:4px;line-height:1.3;}
.khsub{font-size:12px;color:var(--color-text-secondary);}
.kcard{margin:0 20px 14px;border-radius:20px;padding:18px;cursor:pointer;}
.kcard-ai{background:linear-gradient(135deg,#845EC9 0%,#9E83DA 100%);}
.kcard-vet{background:var(--color-bg-surface);border:1.5px solid #E6E6E6;box-shadow:0 6px 20px rgba(22,34,51,.08);}
.kicon{width:46px;height:46px;border-radius:13px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:11px;}
.kicon-vet{background:#F8F6FF;}
.ktitle{font-size:17px;font-weight:700;color:#fff;margin-bottom:3px;}
.ktitle-vet{color:var(--color-text-primary);}
.ksub{font-size:12px;color:rgba(255,255,255,.8);margin-bottom:14px;line-height:1.5;}
.ksub-vet{color:var(--color-text-secondary);}
.kdot{display:flex;align-items:center;gap:6px;margin-bottom:13px;}
.dot{width:7px;height:7px;border-radius:9999px;background:#1FB877;}
.dottxt{font-size:11px;color:rgba(255,255,255,.9);}
.dottxt-vet{color:var(--color-text-secondary);}
.kbtn{border:none;border-radius:11px;padding:10px 16px;font-size:13px;font-weight:700;font-family:'Poppins',sans-serif;cursor:pointer;width:100%;}
.kbtn-white{background:var(--color-bg-surface);color:#845EC9;}
.kbtn-outline{background:transparent;color:#845EC9;border:1.5px solid #C2B0EC;margin-top:11px;}

/* ── PROFIL ── */
.profhead{background:var(--color-bg-surface);padding:14px 20px 18px;box-shadow:0 2px 12px rgba(22,34,51,.06);}
.profrow{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.unm{font-size:17px;font-weight:700;color:var(--color-text-primary);}
.uemail{font-size:11px;color:var(--color-text-secondary);margin-top:2px;}
.editbtn{padding:6px 12px;border-radius:8px;border:1.5px solid #C2B0EC;background:transparent;color:#845EC9;font-size:12px;font-weight:600;font-family:'Poppins',sans-serif;cursor:pointer;}
.petmini{display:flex;align-items:center;gap:11px;background:#F8F6FF;border-radius:13px;padding:11px;}
.pmname{font-size:13px;font-weight:600;color:var(--color-text-primary);}
.pmsub{font-size:11px;color:var(--color-text-secondary);}
.arrow{font-size:12px;color:#845EC9;font-weight:600;}
.psec{padding:14px 20px;}
.psectitle{font-size:11px;font-weight:600;color:var(--color-text-tertiary);margin-bottom:10px;text-transform:uppercase;letter-spacing:.6px;}
.statsel{display:flex;align-items:center;justify-content:space-between;background:var(--color-bg-surface);border-radius:12px;padding:11px 13px;box-shadow:0 2px 8px rgba(22,34,51,.05);}
.ssleft{display:flex;align-items:center;gap:9px;}
.ssicon{font-size:19px;}
.sstxt{font-size:13px;font-weight:500;color:var(--color-text-primary);}
.sssub{font-size:11px;color:var(--color-text-tertiary);}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.pthumb{border-radius:11px;overflow:hidden;aspect-ratio:1;position:relative;}
.pthumb-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:30px;}
.pthumb-badge{position:absolute;top:5px;left:5px;padding:2px 6px;border-radius:5px;font-size:9px;font-weight:700;}

/* ── CREATE POST ── */
.chead{display:flex;align-items:center;padding:11px 20px;gap:11px;}
.closebtn{width:34px;height:34px;border-radius:9999px;background:var(--color-bg-muted);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.ctitle{flex:1;font-size:15px;font-weight:700;color:var(--color-text-primary);text-align:center;}
.pubbtn{padding:8px 15px;background:#845EC9;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;font-family:'Poppins',sans-serif;cursor:pointer;box-shadow:0 4px 12px rgba(132,94,201,.30);}
.pubbtn.off{background:#B6B6B6;box-shadow:none;cursor:not-allowed;}
.typechips{display:flex;gap:7px;padding:0 20px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;}
.typechips::-webkit-scrollbar{display:none;}
.tchip{padding:7px 13px;border-radius:9999px;font-size:12px;font-weight:600;border:1.5px solid #E6E6E6;background:var(--color-bg-surface);color:var(--color-text-secondary);cursor:pointer;white-space:nowrap;}
.tchip.on{background:#845EC9;border-color:#845EC9;color:#fff;}
.petsel{margin:0 20px 14px;display:flex;align-items:center;gap:8px;background:#F8F6FF;border-radius:11px;padding:9px 13px;}
.petsel span{font-size:12px;color:var(--color-text-secondary);}
.petsel strong{font-size:12px;font-weight:600;color:#845EC9;}
.photosec{padding:0 20px;margin-bottom:14px;}
.photolbl{font-size:11px;font-weight:600;color:var(--color-text-secondary);margin-bottom:8px;}
.photogrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.pcell{aspect-ratio:1;border-radius:9px;display:flex;align-items:center;justify-content:center;}
.pcell-add{border:2px dashed #C2B0EC;background:var(--color-bg-subtle);flex-direction:column;gap:3px;cursor:pointer;}
.pcell-add svg{color:#845EC9;}
.pcell-add span{font-size:10px;color:#845EC9;font-weight:500;}
.textarea-wrap{margin:0 20px 11px;background:var(--color-bg-surface);border-radius:11px;border:1.5px solid #E6E6E6;padding:11px;}
.fake-ta{font-size:13px;color:var(--color-text-tertiary);line-height:1.6;min-height:70px;}
.charcount{text-align:right;font-size:11px;color:var(--color-text-tertiary);margin-top:7px;}
.daterow{display:flex;align-items:center;gap:7px;margin:0 20px;padding:9px 0;border-top:1px solid #E6E6E6;}
.daterow svg{color:#845EC9;width:15px;height:15px;flex-shrink:0;}
.daterow span{font-size:12px;color:var(--color-text-secondary);}
.daterow strong{color:var(--color-text-primary);font-weight:600;}

/* ── LEGEND PANEL ── */
.legend{width:300px;flex-shrink:0;}
.lsec{background:var(--color-bg-surface);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.07);}
.ltitle{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--color-text-primary);margin-bottom:14px;}
.popbox{border-radius:11px;overflow:hidden;border:1.5px solid #E6E6E6;display:flex;}
.pstate{flex:1;padding:14px 10px;text-align:center;}
.pstate+.pstate{border-left:1px solid #E6E6E6;}
.pstate-lbl{font-size:10px;font-weight:600;color:var(--color-text-primary);margin-top:7px;}
.pstate-sub{font-size:9px;color:#CCCCCC;margin-top:2px;}
.infonote{margin-top:11px;padding:9px 11px;background:#FDE7EB;border-radius:9px;}
.infonote-title{font-size:11px;font-weight:700;color:#C4263C;margin-bottom:3px;}
.infonote-body{font-size:10px;color:#C4263C;line-height:1.7;}
.swatch-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.swatch{border-radius:9px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.09);}
.swatch-color{height:36px;}
.swatch-info{padding:5px 7px;background:var(--color-bg-surface);}
.swatch-name{font-size:10px;font-weight:700;color:var(--color-text-primary);}
.swatch-hex{font-size:9px;color:var(--color-text-tertiary);font-family:monospace;}
.typo-demo>div{color:var(--color-text-primary);margin-bottom:3px;}
.radii-row{display:flex;gap:9px;align-items:flex-end;flex-wrap:wrap;}
.rsample{text-align:center;}
.rsample div{background:#845EC9;width:30px;height:30px;margin:0 auto 5px;}
.rsample span{font-size:9px;color:var(--color-text-tertiary);}
.qa-list{font-size:11px;color:var(--color-text-primary);line-height:1.9;}

/* ── SPLASH ANIM ── */
@keyframes shimbar{0%{transform:translateX(-180%)}100%{transform:translateX(500%)}}
@keyframes fall1{0%{transform:translateY(-20px) rotate(22deg);opacity:1}100%{transform:translateY(110vh) rotate(200deg);opacity:0}}
@keyframes fall2{0%{transform:translateY(-20px) rotate(-14deg);opacity:1}100%{transform:translateY(110vh) rotate(-180deg);opacity:0}}
@keyframes floatUp{0%{transform:translateY(0) rotate(var(--r,0deg));opacity:.55}100%{transform:translateY(-160px) rotate(calc(var(--r,0deg) + 35deg));opacity:0}}
@keyframes pulseRingSq{0%{transform:translate(-50%,-50%) scale(1);opacity:.65}100%{transform:translate(-50%,-50%) scale(2.8);opacity:0}}
@keyframes iconEnter{0%{transform:scale(.55) rotate(-10deg);opacity:0}65%{transform:scale(1.09) rotate(2.5deg);opacity:1}100%{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes textFadeUp{0%{transform:translateY(22px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes dotBounce{0%,75%,100%{transform:translateY(0);opacity:.35}38%{transform:translateY(-9px);opacity:1}}
@keyframes breathGlow{0%,100%{opacity:.28}50%{opacity:.55}}
@keyframes matchPulse{0%{transform:translate(-50%,-50%) scale(1);opacity:.7}100%{transform:translate(-50%,-50%) scale(1.9);opacity:0}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes reviewProgress{0%{width:0%}100%{width:100%}}
@keyframes slideUp{0%{transform:translateY(100%)}100%{transform:translateY(0)}}
/* flex pages need per-ID on rule so display:none still works when off */
#p-ai-result-red.on,#p-vet-final-diagnosis.on,#p-vet-status-popup.on,#p-milestone-sheet.on,#p-vet-chat.on,#p-vet-profile.on,#p-chat.on{display:flex}
.shimbar{animation:shimbar 1.5s ease-in-out infinite;}
/* vet pages always stay in light palette — override any dark theme at the page level */
.page[data-theme="light"]{
  --color-bg-default:       #FEFEFE;
  --color-bg-surface:       #FFFFFF;
  --color-bg-subtle:        #F8F2FF;
  --color-bg-muted:         #F3F3F3;
  --color-bg-input:         #FFFFFF;
  --color-bg-modal:         #FFFFFF;
  --color-bg-vet:           #FBFAFD;
  --color-bg-vet-surface:   #FFFFFF;
  --color-bg-vet-subtle:    #F8FBFA;
  --color-bg-vet-dialog:    #EFF7F4;
  --color-border-vet:       #E9E4ED;
  --color-border-vet-accent:#DDEDE7;
  --color-border-default:   #E6E6E6;
  --color-border-strong:    #D0D0D0;
  --color-text-heading:     #2E2742;
  --color-text-primary:     #544864;
  --color-text-secondary:   #808080;
  --color-text-tertiary:    #A7A7A7;
  --color-text-vet-heading: #2B2540;
  --color-text-vet-body:    #6F687A;
  --color-mint:             #5BCBBB;
  --color-mint-subtle:      #EFF7F4;
}

/* ── PAGE NAVIGATOR ── */
.navbtn{padding:3px 9px;background:#F8F6FF;border:none;border-radius:6px;font-size:10px;font-weight:600;color:#845EC9;cursor:pointer;font-family:'Poppins',sans-serif;white-space:nowrap;}
.navbtn:hover,.navbtn.cur{background:#845EC9;color:#fff;}
.navgrp{margin-bottom:11px;}
.navgrp-title{font-size:9px;font-weight:700;color:#B6B6B6;letter-spacing:.6px;text-transform:uppercase;margin-bottom:5px;}
.navwrap{display:flex;flex-wrap:wrap;gap:4px;}
</style>
</head>
<body>
<div class="phone">

  <div class="pill"></div>

  <!-- Status Bar -->
  <div class="statusbar">
    <span class="t">9:41</span>
    <div class="icons">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="#544864">
        <rect x="0" y="6" width="3" height="6" rx="1"/>
        <rect x="4.5" y="4" width="3" height="8" rx="1"/>
        <rect x="9" y="1.5" width="3" height="10.5" rx="1"/>
        <rect x="13.5" y="0" width="2.5" height="12" rx="1" opacity=".3"/>
      </svg>
      <svg width="22" height="12" viewBox="0 0 22 12" fill="none">
        <rect x=".75" y=".75" width="17.5" height="10.5" rx="2.25" stroke="#544864" stroke-width="1.5"/>
        <rect x="19" y="4" width="2" height="4" rx="1" fill="#544864"/>
        <rect x="2.25" y="2.25" width="13" height="7.5" rx="1.25" fill="#544864"/>
      </svg>
    </div>
  </div>

  <!-- Pages -->
  <div class="pages">
<div class="page on" id="p-splash" data-notab="true" style="background:#141019;overflow:hidden;">

      <!-- ── Background: 3 atmospheric glow layers ── -->
      <!-- Layer 1: large violet bloom rising from bottom -->
      <div style="position:absolute;inset:0;background:radial-gradient(ellipse 300% 58% at 50% 120%,rgba(132,94,201,.62) 0%,rgba(86,58,142,.22) 42%,transparent 65%);pointer-events:none;"></div>
      <!-- Layer 2: cool mint whisper — upper right -->
      <div style="position:absolute;inset:0;background:radial-gradient(ellipse 130% 36% at 112% -8%,rgba(91,203,187,.16) 0%,transparent 55%);pointer-events:none;"></div>
      <!-- Layer 3: hot red echo — upper left (Pop Art atmosphere) -->

        <div style="position:relative;width:84px;height:84px;">

          <!-- Main violet icon (spring entrance) -->
          <div style="position:absolute;top:0;left:0;width:84px;height:84px;
                      background:linear-gradient(140deg,#9E83DA 0%,#845EC9 55%,#6C48AE 100%);
                      border-radius:26px;display:flex;align-items:center;justify-content:center;
                      box-shadow:0 0 0 1.5px rgba(194,176,236,.5),0 0 52px rgba(132,94,201,.55),0 18px 36px rgba(0,0,0,.55);

            <svg width="46" height="46" viewBox="0 0 32 32" fill="white">

              <ellipse cx="19" cy="6"  rx="3" ry="3.5"/>

              <path d="M23 18c0 5.5-3 9-7 9s-7-3.5-7-9c0-4 2.8-6.5 7-6.5s7 2.5 7 6.5z"/>
            </svg>
          </div>
        </div>

        <!-- Wordmark (delayed fade + slide up) -->
        <div style="text-align:center;animation:textFadeUp .7s cubic-bezier(0,0,.2,1) .48s both;">

      <!-- ── 3-dot bouncing loader ── -->
